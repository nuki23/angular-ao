<div class="flex flex-col items-center gap-4 py-1">

    <!-- Icon badge — params.icon.name recibe un IconDefinition de FA Pro -->
    @if (params.icon?.name) {
    <div class="icon-badge relative w-20 h-20 rounded-full flex items-center justify-center"
        [ngClass]="!!params.icon?.container ? params.icon?.container : 'text-blue-500'">
        <div class="absolute inset-0 rounded-full bg-current opacity-[0.1]"></div>
        <fa-icon [icon]="params.icon?.name ?? faCircleInfo" class="text-[2.5rem] flex relative z-10" />
    </div>
    }

    <!-- Text content -->
    <div class="w-full flex flex-col gap-1.5 text-center px-1">
        @if (params.textBold) {
        <p class="text-slate-800 text-[1.05rem] font-bold leading-snug" [innerHTML]="params.textBold"></p>
        }
        @if (params.text) {
        <p class="text-slate-500 text-sm leading-relaxed mt-0.5" [innerHTML]="params.text"></p>
        }
        @if (params.subText) {
        <p class="text-slate-700 text-sm font-semibold" [innerHTML]="params.subText"></p>
        }
    </div>

    <!-- Buttons -->
    <div class="w-full flex gap-2">
        @if (params.cancelButton) {
        <button nz-button class="flex-1 h-10! rounded-full!" nzType="default" (click)="cancel()">
            {{ params.cancelButton.text }}
        </button>
        }
        @if (params.exitButton) {
        <button nz-button class="flex-1 h-10! rounded-full!" nzType="primary" nzDanger (click)="Exit()">
            {{ params.exitButton.text }}
        </button>
        }
        @if (params.confirmButton) {
        <button nz-button class="flex-1 h-10! rounded-full!" nzType="primary" (click)="confirm()">
            {{ params.confirmButton.text }}
        </button>
        }
    </div>

</div>
